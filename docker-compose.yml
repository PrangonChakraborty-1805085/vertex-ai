version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - HF_HOME=/app/.cache/huggingface
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - GRAPH_PERSIST_PATH=/app/data/graph_store/knowledge_graph.pkl
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
    volumes:
      - vertex_chroma:/app/data/chroma_db
      - vertex_graph:/app/data/graph_store
      - vertex_hf_cache:/app/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ui:
    build: .
    command: streamlit run vertex/ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - FASTAPI_PORT=8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  vertex_chroma:
  vertex_graph:
  vertex_hf_cache:
