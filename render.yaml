services:
  - type: web
    name: vertex-api
    runtime: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn vertex.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false          # you set this in Render dashboard
      - key: COHERE_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: SEC_USER_AGENT
        sync: false
      - key: QDRANT_MODE
        value: server
      - key: QDRANT_URL
        sync: false          # your Qdrant Cloud URL
      - key: QDRANT_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: embed-english-light-v3.0
      - key: EMBEDDING_PROVIDER
        value: cohere
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: DEBATE_MAX_ROUNDS
        value: 3
      - key: DEBATE_CONFIDENCE_THRESHOLD
        value: "0.75"
      - key: GRAPH_PERSIST_PATH
        value: /tmp/graph_store/knowledge_graph.pkl
      - key: LOG_LEVEL
        value: INFO
